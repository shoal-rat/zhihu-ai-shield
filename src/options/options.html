<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>知乎 AI 清净器设置</title>
    <link rel="stylesheet" href="./options.css">
  </head>
  <body>
    <main class="shell">
      <header class="page-header">
        <div>
          <span class="eyebrow">Zhihu AI Shield</span>
          <h1>知乎 AI 清净器设置</h1>
        </div>
        <button id="saveTop" type="button" class="primary">保存</button>
      </header>

      <form id="settingsForm" class="layout">
        <section class="section">
          <h2>运行</h2>
          <label class="check">
            <input id="enabled" type="checkbox">
            <span>启用自动屏蔽</span>
          </label>
          <label class="check">
            <input id="fetchRecentContent" type="checkbox">
            <span>读取作者近作</span>
          </label>
          <label class="check">
            <input id="guestMode" type="checkbox">
            <span>未登录时处理公开内容</span>
          </label>
        </section>

        <section class="section">
          <h2>本机 LLM</h2>
          <label>
            <span>Endpoint</span>
            <input id="endpoint" type="url" placeholder="http://127.0.0.1:11434/v1/chat/completions">
          </label>
          <label>
            <span>模型名</span>
            <input id="model" type="text" placeholder="qwen2.5:0.5b">
          </label>
          <div class="inline-actions">
            <button id="testModel" type="button">测试模型</button>
            <span id="testResult" class="hint"></span>
          </div>
        </section>

        <section class="section">
          <h2>判定</h2>
          <label>
            <span>屏蔽阈值 <b id="thresholdValue">72%</b></span>
            <input id="threshold" type="range" min="0.45" max="0.95" step="0.01">
          </label>
          <label>
            <span>最低置信度 <b id="confidenceValue">42%</b></span>
            <input id="confidenceFloor" type="range" min="0" max="0.9" step="0.01">
          </label>
          <label>
            <span>近作篇数</span>
            <input id="maxSamples" type="number" min="1" max="5" step="1">
          </label>
          <label>
            <span>单篇截断字数</span>
            <input id="sampleCharLimit" type="number" min="260" max="3000" step="20">
          </label>
          <label>
            <span>缓存小时数</span>
            <input id="cacheTtlHours" type="number" min="1" max="720" step="1">
          </label>
        </section>

        <section class="section">
          <h2>显示</h2>
          <label>
            <span>命中后处理</span>
            <select id="hideMode">
              <option value="rewrite">改写成占位块</option>
              <option value="collapse">折叠成占位块</option>
              <option value="blur">模糊原内容</option>
              <option value="hide">直接隐藏</option>
            </select>
          </label>
          <label class="check">
            <input id="showReason" type="checkbox">
            <span>显示模型原因</span>
          </label>
        </section>

        <section class="section wide">
          <h2>名单</h2>
          <div class="two-col">
            <label>
              <span>白名单，每行一个作者 slug、名称或链接</span>
              <textarea id="allowList" rows="8"></textarea>
            </label>
            <label>
              <span>黑名单，每行一个作者 slug、名称或链接</span>
              <textarea id="blockList" rows="8"></textarea>
            </label>
          </div>
        </section>

        <section class="section wide note">
          <h2>隐私边界</h2>
          <p>扩展只把样本文本发给本机 OpenAI-compatible 模型接口。推荐使用 Ollama、LM Studio、vLLM 或其他本机服务。</p>
          <p>游客兼容只处理知乎已经公开加载到页面里的内容，不伪造登录态，不调用绕过登录或访问限制的第三方代码。</p>
        </section>
      </form>

      <footer class="bar">
        <button id="clearCache" type="button">清空缓存</button>
        <button id="exportData" type="button">导出数据</button>
        <button id="saveBottom" type="button" class="primary">保存设置</button>
      </footer>
      <div id="toast" class="toast" role="status"></div>
    </main>
    <script src="./options.js"></script>
  </body>
</html>
